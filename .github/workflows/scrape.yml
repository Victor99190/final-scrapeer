name: Nepali News Scraper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Nepali news scraper
        run: python scrape.py --output data --retention 2 --since-hours 24 --delay 2 --max-links 30 --include-unknown-date

      # ---------------------------------------------------------
      # NEW: Commit and Push the scraped data back to the repo
      # ---------------------------------------------------------
      - name: Commit and push scraped data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # The '|| true' prevents the workflow from failing if no new articles were found
          git commit -m "Automated scraper data update" || true
          git push
      # ---------------------------------------------------------
